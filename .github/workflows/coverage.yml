name: Coverage

on:
  push:
    branches: [main]
  pull_request:

# The workflow requests no privileged token by default. Only the `upload` job
# below requests id-token, and it runs no PR-controlled code.
permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Builds and runs the (possibly fork-controlled) tests. Deliberately holds NO
  # id-token: a malicious PR build/test script cannot mint the Codecov OIDC
  # token, because this job never holds it. It only produces coverage artifacts.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: cargo llvm-cov nextest --profile ci --lcov --output-path lcov.info
      - name: Upload coverage artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-data
          path: |
            lcov.info
            target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 1

  # Forwards the coverage artifacts to Codecov via OIDC. OIDC is only available
  # to same-repo runs, so this job is skipped for fork PRs (which cannot mint the
  # token) — external contributions never fail on an unavailable OIDC token. The
  # job downloads only data artifacts and runs no PR code, so id-token stays
  # outside the PR trust boundary.
  upload:
    needs: test
    # Run even when `test` failed (so Codecov still receives failing test
    # results), but never when cancelled, and only for same-repo events where
    # OIDC is available.
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-data
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./lcov.info
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          files: ./target/nextest/ci/junit.xml
          use_oidc: true
